<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1s ease forwards;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 10rem);
      color: #f0f0f0;
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 4px 4px 0px #ff3c3c, 8px 8px 0px rgba(255,60,60,0.2);
      animation: glitch 4s infinite;
    }

    .sub {
      margin-top: 1.5rem;
      font-size: clamp(0.75rem, 2vw, 1rem);
      color: #ff3c3c;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.6s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes glitch {
      0%, 92%, 100% { text-shadow: 4px 4px 0px #ff3c3c, 8px 8px 0px rgba(255,60,60,0.2); }
      93%            { text-shadow: -4px 4px 0px #3cffef, 8px -4px 0px #ff3c3c; }
      94%            { text-shadow: 4px -4px 0px #ff3c3c, -8px 4px 0px #3cffef; }
      95%            { text-shadow: 4px 4px 0px #ff3c3c, 8px 8px 0px rgba(255,60,60,0.2); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HELLO WORLD!<br>IM A WEBSITE</h1>
    <p class="sub">● online and ready ●</p>
  </div>
</body>
</html>
